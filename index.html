<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ужин в Медведково</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Caveat:wght@400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100%;
            min-height: 100svh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(to bottom right, #FFF5F7, #FFF0F5, #F5F0FF);
            overflow-x: hidden;
            overflow-y: auto;
            position: relative;
            padding: 24px;
        }

        .flower {
            position: absolute;
            z-index: 1;
        }

        .card {
            position: relative;
            z-index: 2;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.08);
            padding: 64px;
            max-width: 672px;
            width: 100%;
            background-image: url("data:image/svg+xml,%3Csvg width='200' height='200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' /%3E%3CfeColorMatrix type='saturate' values='0'/%3E%3C/filter%3E%3Crect width='200' height='200' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
            margin: 24px 0;
        }

        .title {
            font-family: 'Playfair Display', serif;
            font-size: 3.5rem;
            font-weight: 700;
            color: #6B4423;
            letter-spacing: 0.02em;
            line-height: 1.2;
            text-align: center;
            margin-bottom: 16px;
        }

        .subtitle {
            font-family: 'Caveat', cursive;
            font-size: 1.75rem;
            color: #8B6F47;
            font-weight: 500;
            text-align: center;
            margin-bottom: 48px;
        }

        .divider {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 40px;
        }

        .divider-line {
            height: 1px;
            width: 128px;
            background: linear-gradient(to right, transparent, #D4A574, transparent);
        }

        .divider-flower {
            margin: 0 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .program {
            margin-bottom: 48px;
        }

        .program-item {
            display: flex;
            align-items: flex-start;
            margin-bottom: 16px;
        }

        .program-number {
            font-family: 'Inter', sans-serif;
            font-size: 0.875rem;
            color: #8B6F47;
            font-weight: 300;
            opacity: 0.6;
            margin-right: 12px;
            margin-top: 4px;
            flex-shrink: 0;
        }

        .program-text {
            font-family: 'Inter', sans-serif;
            font-size: 1.125rem;
            color: #6B4423;
            font-weight: 400;
            letter-spacing: 0.01em;
            line-height: 1.4;
        }

        .footer {
            text-align: center;
            padding-top: 32px;
            border-top: 1px solid rgba(229, 212, 193, 0.3);
        }

        .footer-text {
            font-family: 'Inter', sans-serif;
            font-size: 0.875rem;
            color: #A0826D;
            font-weight: 300;
            letter-spacing: 0.05em;
        }

        @media (max-width: 640px) {
            body {
                padding: 14px;
                align-items: flex-start;
            }

            .card {
                padding: 28px 20px;
                border-radius: 20px;
                margin: 10px 0 18px;
            }

            .title {
                font-size: 2.2rem;
                margin-bottom: 10px;
            }

            .subtitle {
                font-size: 1.45rem;
                margin-bottom: 24px;
            }

            .divider {
                margin-bottom: 24px;
            }

            .divider-line {
                width: 72px;
            }

            .divider-flower {
                margin: 0 12px;
            }

            .program {
                margin-bottom: 28px;
            }

            .program-item {
                margin-bottom: 10px;
            }

            .program-number {
                font-size: 0.8rem;
                margin-right: 8px;
                margin-top: 3px;
            }

            .program-text {
                font-size: 0.98rem;
                line-height: 1.35;
            }

            .footer {
                padding-top: 20px;
            }

            .footer-text {
                font-size: 0.8rem;
                letter-spacing: 0.03em;
            }

            .flower {
                transform: scale(0.72) !important;
                opacity: 0.85;
            }

            .flower:nth-of-type(8),
            .flower:nth-of-type(9),
            .flower:nth-of-type(10),
            .flower:nth-of-type(11) {
                display: none;
            }
        }

        @media (max-width: 380px) {
            body {
                padding: 10px;
            }

            .card {
                padding: 22px 16px;
                border-radius: 18px;
            }

            .title {
                font-size: 1.8rem;
            }

            .subtitle {
                font-size: 1.2rem;
                margin-bottom: 18px;
            }

            .divider {
                margin-bottom: 18px;
            }

            .divider-line {
                width: 52px;
            }

            .divider-flower {
                margin: 0 8px;
            }

            .program {
                margin-bottom: 20px;
            }

            .program-item {
                margin-bottom: 8px;
            }

            .program-number {
                font-size: 0.75rem;
            }

            .program-text {
                font-size: 0.92rem;
                line-height: 1.3;
            }

            .footer {
                padding-top: 16px;
            }

            .footer-text {
                font-size: 0.75rem;
            }

            .flower {
                transform: scale(0.58) !important;
                opacity: 0.75;
            }
        }
    </style>
</head>
