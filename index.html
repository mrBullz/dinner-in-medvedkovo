<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ужин в Медведково</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Caveat:wght@400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100%;
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(to bottom right, #FFF5F7, #FFF0F5, #F5F0FF);
            overflow: hidden;
            position: relative;
            padding: 24px;
        }

        .flower {
            position: absolute;
            z-index: 1;
            pointer-events: none;
        }

        .card {
            position: relative;
            z-index: 2;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.08);
            padding: 64px;
            max-width: 672px;
            width: min(100%, 672px);
            background-image: url("data:image/svg+xml,%3Csvg width='200' height='200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' /%3E%3CfeColorMatrix type='saturate' values='0'/%3E%3C/filter%3E%3Crect width='200' height='200' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
        }

        .title {
            font-family: 'Playfair Display', serif;
            font-size: 3.5rem;
            font-weight: 700;
            color: #6B4423;
            letter-spacing: 0.02em;
            line-height: 1.15;
            text-align: center;
            margin-bottom: 16px;
        }

        .subtitle {
            font-family: 'Caveat', cursive;
            font-size: 1.75rem;
            color: #8B6F47;
            font-weight: 500;
            text-align: center;
            margin-bottom: 48px;
        }

        .divider {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 40px;
        }

        .divider-line {
            height: 1px;
            width: 128px;
            background: linear-gradient(to right, transparent, #D4A574, transparent);
        }

        .divider-flower {
            margin: 0 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .program {
            margin-bottom: 48px;
        }

        .program-item {
            display: flex;
            align-items: flex-start;
            margin-bottom: 16px;
        }

        .program-number {
            font-family: 'Inter', sans-serif;
            font-size: 0.875rem;
            color: #8B6F47;
            font-weight: 300;
            opacity: 0.6;
            margin-right: 12px;
            margin-top: 4px;
            flex-shrink: 0;
        }

        .program-text {
            font-family: 'Inter', sans-serif;
            font-size: 1.125rem;
            color: #6B4423;
            font-weight: 400;
            letter-spacing: 0.01em;
            line-height: 1.4;
        }

        .footer {
            text-align: center;
            padding-top: 32px;
            border-top: 1px solid rgba(229, 212, 193, 0.3);
        }

        .footer-text {
            font-family: 'Inter', sans-serif;
            font-size: 0.875rem;
            color: #A0826D;
            font-weight: 300;
            letter-spacing: 0.05em;
        }

        /* MOBILE */
        @media (max-width: 640px) {
            body {
                padding: 8px;
            }

            .card {
                width: calc(100% - 8px);
                max-width: none;
                padding: 28px 22px;
                border-radius: 22px;
            }

            .title {
                font-size: 2.05rem;
                line-height: 1.08;
                margin-bottom: 10px;
            }

            .subtitle {
                font-size: 1.28rem;
                margin-bottom: 24px;
            }

            .divider {
                margin-bottom: 24px;
            }

            .divider-line {
                width: 92px;
            }

            .divider-flower {
                margin: 0 10px;
            }

            .program {
                margin-bottom: 26px;
            }

            .program-item {
                margin-bottom: 12px;
            }

            .program-number {
                font-size: 0.82rem;
                margin-right: 10px;
                margin-top: 3px;
            }

            .program-text {
                font-size: 0.96rem;
                line-height: 1.32;
            }

            .footer {
                padding-top: 20px;
            }

            .footer-text {
                font-size: 0.8rem;
                letter-spacing: 0.02em;
            }

            /* Оставляем только аккуратные цветочки вокруг карточки */
            .flower {
                transform: scale(0.8) !important;
                opacity: 0.95;
            }

            /* Перепозиционируем цветы под мобильную композицию */
            .flower.f1 { top: 5%; left: 6%; }
            .flower.f2 { top: 10%; right: 6%; left: auto; }
            .flower.f3 { top: 38%; left: 3%; }
            .flower.f4 { top: 78%; right: 6%; left: auto; }
            .flower.f5 { bottom: 9%; left: 18%; top: auto; }
            .flower.f6 { bottom: 5%; right: 10%; top: auto; }

            /* Лишние цветы на телефоне скрываем */
            .flower.f7,
            .flower.f8,
            .flower.f9,
            .flower.f10,
            .flower.f11 {
                display: none;
            }
        }

        @media (max-width: 380px) {
            body {
                padding: 6px;
            }

            .card {
                padding: 22px 16px;
                border-radius: 20px;
            }

            .title {
                font-size: 1.75rem;
            }

            .subtitle {
                font-size: 1.12rem;
                margin-bottom: 18px;
            }

            .divider {
                margin-bottom: 18px;
            }

            .divider-line {
                width: 72px;
            }

            .program {
                margin-bottom: 20px;
            }

            .program-item {
                margin-bottom: 10px;
            }

            .program-number {
                font-size: 0.75rem;
            }

            .program-text {
                font-size: 0.9rem;
            }

            .footer {
                padding-top: 16px;
            }

            .footer-text {
                font-size: 0.75rem;
            }

            .flower {
                transform: scale(0.68) !important;
            }
        }
    </style>
</head>
